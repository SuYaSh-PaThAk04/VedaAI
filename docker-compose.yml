# Local / VPS production stack. For cloud deploy, see docs/DEPLOY.md and render.yaml.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/vedaai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      MOCK_AI: ${MOCK_AI:-false}
    depends_on:
      - mongo
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/vedaai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      MOCK_AI: ${MOCK_AI:-false}
    depends_on:
      - mongo
      - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - api

volumes:
  mongo_data:
